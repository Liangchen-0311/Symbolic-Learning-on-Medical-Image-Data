dataset: hbfmid
device: cuda:0
gpu_id: 0

dataset_options:
  data_dir: /home/lqg1/code_8T/25/lxw/4/Symbolic-Learning/symbolic-rl/datasets/Human Bone Fractures Multi-modal Image Dataset (HBFMID)/Bone Fractures Detection
  resolution_quick: 128
  resolution_full: 640
  num_classes: 10
  class_names:
    - Comminuted
    - Greenstick
    - Healthy
    - Linear
    - Oblique Displaced
    - Oblique
    - Segmental
    - Spiral
    - Transverse Displaced
    - Transverse

model:
  max_depth: 6
  max_sequence_length: 15
  embedding_dim: 128
  hidden_size: 256
  num_layers: 2
  dropout: 0.1

training:
  batch_size: 32
  eval_batch_size: 32
  iterations: 5000
  episodes_per_iteration: 30
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.05
  max_grad_norm: 0.5
  n_epochs_ppo: 6
  batch_size_ppo: 64
  binary_op_bias: 0.3
  length_penalty: 0.01
  diversity_penalty: 0.08
  num_classes: 10
  entropy_coef_start: 0.10
  entropy_coef_end: 0.005
  entropy_decay_fraction: 0.5
  lr_warmup_iterations: 20

strategy:
  feature_bank_size: 1000
  min_accuracy_threshold: 0.08
  correlation_threshold: 0.85
  correlation_threshold_full: 0.80
  adaptive_threshold: true
  threshold_warmup_fraction: 0.6
  reward_type: balanced_accuracy
  use_hierarchical_eval: true
  hierarchical_switch_fraction: 0.3
  diversity_penalty: 0.08
  medical_interpretability_bonus: 0.05

multi_bank:
  enabled: true
  num_banks: 5
  bank_configs:
    - {max_depth: 4, max_sequence_length: 8, focus: "short_edge"}
    - {max_depth: 6, max_sequence_length: 15, binary_op_bias: 0.5, focus: "cross_channel"}
    - {max_depth: 5, max_sequence_length: 12, focus: "texture_morphology"}
    - {max_depth: 6, max_sequence_length: 15, focus: "multiscale_symmetry"}
    - {max_depth: 7, max_sequence_length: 18, binary_op_bias: 0.4, focus: "deep_composite"}

phase3:
  distribution_stats:
    n_stats: 16
    n_regions: 7
    features_per_body: 112

  fisher_vector:
    n_patches: 64
    pca_dim: 16
    gmm_k: 32
    fv_dim: 1024

  kernel_map:
    order: 1
    top_k_features: 5000

  l1_select_target: 5000
  interaction_top_k: 100

classifier:
  weight_decay_sweep: [1, 5, 10, 20, 50]
  epochs: 50
  train_samples_per_class: -1
  use_smote: true
  use_class_weight: true

validation:
  prefilter_acc_threshold: 0.10
  fullres_acc_threshold: 0.10

exclude_operators: []
checkpoint_interval: 200
output_dir: outputs/fracture_v3_expanded
augment: true

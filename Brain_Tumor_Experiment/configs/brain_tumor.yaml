dataset: brain_tumor
device: cuda:0
gpu_id: 0

dataset_options:
  # Root containing Training/ and Testing/ (val is carved from Training).
  data_dir: /home/ET/lctan/Symbolic-Learning/Symbolic-Learning-on-Medical-Image-Data/Brain Tumor MRI Dataset
  resolution: 224          # MRI is 512x512; downscale for tractable feature extraction
  val_fraction: 0.15       # stratified hold-out from Training
  split_seed: 42
  num_classes: 4
  class_names:
    - glioma
    - meningioma
    - pituitary
    - notumor
  task: multiclass

# Grayscale terminal channels (must match src/rl/brain_tumor_environment.BRAIN_TERMINALS).
terminal_tokens: [I_GRAY, I_BLUR, I_GRAD, I_LOCALSTD, I_LOG, I_LBP, I_LRDIFF]

model:
  max_depth: 6
  max_sequence_length: 15
  embedding_dim: 128
  hidden_size: 256
  num_layers: 2
  dropout: 0.1

training:
  batch_size: 32
  eval_batch_size: 256
  iterations: 3000
  episodes_per_iteration: 20
  learning_rate: 0.0003
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  value_coef: 0.5
  entropy_coef: 0.05
  max_grad_norm: 0.5
  n_epochs_ppo: 6
  batch_size_ppo: 64
  binary_op_bias: 0.3
  length_penalty: 0.01
  diversity_penalty: 0.08
  num_classes: 4
  entropy_coef_start: 0.10
  entropy_coef_end: 0.005
  entropy_decay_fraction: 0.5
  lr_warmup_iterations: 20
  early_stop_patience: 150
  # Soft operator prior toward the glioma-discriminative family (from formula
  # analysis): coarse-scale texture heterogeneity + bilateral asymmetry. Negative
  # values penalize over-aggressive downsampling / fine LBP that were depleted in
  # top glioma formulas. Applied only to non-neutral banks (see multi_bank).
  operator_bias:
    texture_entropy: 1.0
    local_range: 1.0
    lr_symmetry: 1.0
    blur_7x7: 0.7
    low_freq: 0.7
    dog: 0.7
    gabor_0: 0.5
    gabor_45: 0.5
    downsample_4x: -1.0
    stride_pool_4: -1.0
    lbp_like: -0.7

strategy:
  feature_bank_size: 1500
  min_accuracy_threshold: 0.30     # 4 balanced classes -> chance is 0.25
  correlation_threshold: 0.90
  correlation_threshold_full: 0.85
  adaptive_threshold: true
  threshold_warmup_fraction: 0.6
  reward_type: balanced_accuracy
  use_hierarchical_eval: true      # tumor vs notumor superclass early on
  hierarchical_switch_fraction: 0.3
  diversity_penalty: 0.05

multi_bank:
  enabled: true
  num_banks: 4
  # 2 neutral banks (general-purpose pool) + 2 biased banks (glioma-focused prior).
  bank_configs:
    - {max_depth: 4, max_sequence_length: 8, focus: "intensity_structure", neutral: true}
    - {max_depth: 6, max_sequence_length: 15, binary_op_bias: 0.5, focus: "texture_pattern", neutral: true}
    - {max_depth: 5, max_sequence_length: 12, focus: "border_morphology"}
    - {max_depth: 6, max_sequence_length: 15, focus: "bilateral_symmetry"}

# Exclude color-only operators (degenerate on grayscale), skin-specific morphology,
# B2 (conv-free): disable the learnable/kernel-bank conv operators entirely.
# They are the sole source of cross-process / cross-bank non-reproducibility
# (random init, CPU/GPU device mismatch in standalone step3/4) and add ~0 to
# accuracy (ablation: 98 conv-free formulas matched all 800). The base library
# already provides fixed Gabor/Sobel/Laplacian/DoG. tophat is near-zero on MRI.
exclude_operators:
  - tophat
  - classic_edge_x
  - classic_edge_y
  - classic_laplacian
  - classic_gabor_0
  - classic_gabor_45
  - classic_gabor_90
  - conv3x3_0
  - conv3x3_1
  - conv3x3_2
  - conv3x3_3
  - conv3x3_4
  - conv3x3_5
  - conv3x3_6
  - conv3x3_7
  - conv5x5_0
  - conv5x5_1
  - conv5x5_2
  - conv5x5_3

phase3:
  distribution_stats:
    n_stats: 12          # [mean,std,max,skew,kurt,q10,q25,q50,q75,q90,ratio>mu,range]
    n_regions: 5         # whole + 4 quadrants (=60/body). 10 = whole + 3x3 grid (finer)
    features_per_body: 60
  l1_select_target: 5000
  interaction_top_k: 100

classifier:
  # light_cv=true -> small HGB grid + only [hgb_baseline, hgb_mi] (much faster,
  # MI recomputed far fewer times). false -> full 4-method grid (slow, thorough).
  light_cv: false
  # Optional explicit overrides (else derived from light_cv):
  #   methods: [hgb_baseline, hgb_mi]
  #   hgb_K_values: [200, 300]
  #   hgb_configs: [[200, 0.1, 3], [300, 0.05, 5]]
  use_smote: false
  use_class_weight: true

# Step 3 = post-merge de-duplication + quality gating.
validation:
  signature_subset_size: 1200        # class-balanced images used to score/compare bodies
  min_quality_keep_fraction: 0.7     # keep top 70% of bodies by ANOVA-F quality
  dedup_correlation_threshold: 0.95  # drop a body if |Pearson| with a kept body >= this
  max_formulas: 800                  # final cap after de-dup
  # Default ON: blend global ANOVA-F with glioma-vs-meningioma discriminability
  # (the hardest pair). Net +0.7% test acc vs plain step3 (0.899 -> 0.906).
  focus_pair: [glioma, meningioma]
  focus_weight: 0.5

step6:
  permutation_importance: false

checkpoint_interval: 200
output_dir: /home/ET/lctan/Symbolic-Learning/Symbolic-Learning-on-Medical-Image-Data/Brain_Tumor_Experiment/outputs/brain_tumor_prior
augment: true
